<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Scan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>🏠 Home Scan</h1>
        <p class="subtitle">Évaluez et comparez vos biens immobiliers</p>
    </header>

    <main>

        <!-- Property name input — lets the user identify the property being evaluated -->
        <!-- Property information — name, listing URL, and optional photo -->
        <section class="property-header">

            <div class="property-field">
                <label for="property-name">Nom du bien</label>
                <input type="text" id="property-name" placeholder="Ex : Maison Dupont, Villa les Pins…">
            </div>

            <div class="property-field">
                <label for="property-url">Lien de l'annonce</label>
                <input type="url" id="property-url" placeholder="https://…">
            </div>

            <div class="property-field">
                <label for="property-price">Prix du bien</label>
                <div class="price-input-wrapper">
                    <input type="number" id="property-price" placeholder="Ex : 350000" min="0">
                    <span class="price-currency">€</span>
                </div>
            </div>
            
            <div class="property-field">
                <label>Photo du bien</label>
                <!-- Drop zone — accepts file selection, drag & drop, and paste -->
                <div id="photo-dropzone">
                    <span id="dropzone-hint">📎 Glisser une photo, coller (Ctrl+V) ou cliquer pour choisir</span>
                    <input type="file" id="property-photo" accept="image/*">
                    <img id="photo-preview" src="" alt="Aperçu du bien">
                </div>
            </div>

        </section>

        <!-- This div will be filled dynamically by app.js -->
        <!-- Each family of criteria will become a <section> inside here -->
        <div id="form-container">
            <p class="loading">Chargement des critères…</p>
        </div>

        <!-- Fixed bottom bar with the score and submit button -->
        <div class="bottom-bar">
            <div class="score-preview">
                Score : <span id="score-display">—</span>
            </div>
            <button id="submit-btn">Voir la fiche synthèse →</button>
        </div>

    </main>

    <script src="/static/app.js"></script>
</body>
</html>
